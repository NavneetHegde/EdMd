<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Content-Security-Policy: defence-in-depth behind Toast's HTML sanitizer. The
     WebView2/loopback origin exposes the file-writing bridge, so a sanitizer bypass in
     a malicious .md would otherwise be code-execution-with-disk-access. script-src 'self'
     means injected inline scripts / on* handlers can't run even if they survive rendering;
     the app's own JS lives in app.js (no inline script). style-src keeps 'unsafe-inline'
     because the theming relies on an inline <style> block + inline style attributes, which
     are not a script-execution vector. img-src is permissive so document images still render;
     connect-src 'self' allows the browser build's /__session fetch. No 'unsafe-eval'. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
<!-- Never send a Referer to external resources (e.g. a document's remote <img>), so the
     page URL — which briefly carries the ?session token in the browser handoff — can't leak. -->
<meta name="referrer" content="no-referrer">
<link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48">
<title>Ed Md</title>
<!-- Toast UI Editor is vendored locally (v3.2.2) rather than loaded from a CDN:
     the editor JS runs inside the WebView2 that can write files, so a CDN/DNS
     compromise or a floating "latest" version would be code-execution with disk
     access. Local assets also make the app work fully offline. -->
<link rel="stylesheet" href="vendor/toastui/toastui-editor.min.css" />
<!-- Dark theme lives in a SEPARATE stylesheet; without it the .toastui-editor-dark
     class does nothing and the toolbar icons render dark-on-dark (invisible). -->
<link rel="stylesheet" href="vendor/toastui/toastui-editor-dark.min.css" />
<script src="vendor/toastui/toastui-editor-all.min.js"></script>
<style>
  :root{
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, "Inter", system-ui, -apple-system, sans-serif;
    --zoom: 1;
    --read-col: 46rem;  /* reading-column width; set by the reading-width control */
    /* Default palette = Nord (also the fallback before JS sets a theme). */
    --bg:#2e3440; --panel:#333b4a; --panel-2:#3b4252; --border:#4c566a;
    --text:#eceff4; --muted:#9aa5b8; --accent:#88c0d0; --accent-dim:#5e81ac; --amber:#ebcb8b;
  }
  /* Every theme just re-declares the same variable palette; all app + editor
     chrome tracks these, so adding a theme is purely a matter of picking colors.
     Register the id + isDark flag in the THEMES array in the script below. */
  body[data-theme="light"]{
    --bg:#fbfbfa; --panel:#f2f2f0; --panel-2:#e8e8e5; --border:#d9d9d5;
    --text:#1e1f22; --muted:#6b6d76; --accent:#0f8f83; --accent-dim:#2f6f68; --amber:#a8710a;
  }
  body[data-theme="nord"]{
    --bg:#2e3440; --panel:#333b4a; --panel-2:#3b4252; --border:#4c566a;
    --text:#eceff4; --muted:#9aa5b8; --accent:#88c0d0; --accent-dim:#5e81ac; --amber:#ebcb8b;
  }
  body[data-theme="dracula"]{
    --bg:#282a36; --panel:#2f313f; --panel-2:#383a4a; --border:#44475a;
    --text:#f8f8f2; --muted:#7b84b8; --accent:#bd93f9; --accent-dim:#6844a0; --amber:#f1fa8c;
  }
  body[data-theme="rose"]{
    --bg:#191724; --panel:#1f1d2e; --panel-2:#26233a; --border:#403d52;
    --text:#e0def4; --muted:#908caa; --accent:#ebbcba; --accent-dim:#9d7476; --amber:#f6c177;
  }
  body[data-theme="gruvbox"]{
    --bg:#282828; --panel:#32302f; --panel-2:#3c3836; --border:#504945;
    --text:#ebdbb2; --muted:#a89984; --accent:#b8bb26; --accent-dim:#79740e; --amber:#fabd2f;
  }
  body[data-theme="solarized"]{
    --bg:#fdf6e3; --panel:#f4edd8; --panel-2:#eee8d5; --border:#ddd6c1;
    --text:#073642; --muted:#657b83; --accent:#268bd2; --accent-dim:#2076b8; --amber:#b58900;
  }
  /* Prism: a colorful theme where headings, italic and bold each get their own hue. */
  body[data-theme="prism"]{
    --bg:#0f111a; --panel:#171a26; --panel-2:#1e2230; --border:#2b3040;
    --text:#c7cbd9; --muted:#6b7089; --accent:#82aaff; --accent-dim:#3d59a1; --amber:#ffcb6b;
    --c-h1:#ff5370; --c-h2:#f78c6c; --c-h3:#c3e88d; --c-em:#89ddff; --c-strong:#ffcb6b;
  }
  /* Prism-style themes below: each opts into --c-h1/--c-h2/--c-h3/--c-em/--c-strong so
     headings, italic and bold each carry their own hue. Two dark, two light. */
  body[data-theme="aurora"]{
    --bg:#10141c; --panel:#161c28; --panel-2:#1e2636; --border:#2c3648;
    --text:#d5deeb; --muted:#6f7d94; --accent:#8be9c0; --accent-dim:#2f6d59; --amber:#ffd479;
    --c-h1:#8be9c0; --c-h2:#7aa2f7; --c-h3:#bb9af7; --c-em:#9ece6a; --c-strong:#ffd479;
  }
  body[data-theme="sunset"]{
    --bg:#1a1216; --panel:#241820; --panel-2:#2f2029; --border:#43303a;
    --text:#f0dfe0; --muted:#a78a92; --accent:#ff8f70; --accent-dim:#a05436; --amber:#ffcf6b;
    --c-h1:#ff6b81; --c-h2:#ff9e64; --c-h3:#ffd479; --c-em:#f7a8c4; --c-strong:#ff8f70;
  }
  body[data-theme="blossom"]{
    --bg:#fff7fb; --panel:#fbeef4; --panel-2:#f6e3ec; --border:#ecd2de;
    --text:#3a2b33; --muted:#8a6e7a; --accent:#c33d86; --accent-dim:#a83070; --amber:#c77d0e;
    --c-h1:#d6336c; --c-h2:#7048e8; --c-h3:#0c8599; --c-em:#e8590c; --c-strong:#c33d86;
  }
  body[data-theme="citrus"]{
    --bg:#fcfdf5; --panel:#f2f6e4; --panel-2:#e9efd6; --border:#d9e2bf;
    --text:#2c3324; --muted:#6b7758; --accent:#2f9e44; --accent-dim:#2b8a3e; --amber:#e67700;
    --c-h1:#2f9e44; --c-h2:#e8590c; --c-h3:#1971c2; --c-em:#9c36b5; --c-strong:#e03131;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:background .15s ease, color .15s ease;}
  header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
  /* Logo chip: a highlighted gradient badge built from the active theme's accent, so it
     pops against the toolbar and re-tints with every theme. */
  .brand{display:inline-flex;align-items:center;justify-content:center;
    width:44px;height:44px;aspect-ratio:1;flex-shrink:0;
    font-family:var(--mono);font-weight:800;font-size:15px;letter-spacing:.02em;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent-dim));
    border-radius:9px;margin-right:12px;border:1px solid var(--accent);
    box-shadow:0 2px 8px rgba(0,0,0,.32);text-shadow:0 1px 1px rgba(0,0,0,.25);}
  button{background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:7px 12px;border-radius:6px;font-family:var(--sans);font-size:13px;cursor:pointer;}
  button:hover{border-color:var(--accent-dim);}
  button.primary{background:var(--accent-dim);border-color:var(--accent);color:#fff;}
  select{background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:7px 10px;border-radius:6px;font-family:var(--sans);font-size:13px;cursor:pointer;}
  select:hover{border-color:var(--accent-dim);}
  select option{background:var(--panel);color:var(--text);}
  .filename{font-family:var(--mono);font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .filename .name{color:var(--text);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:none;}
  .dot.show{display:inline-block;}
  .spacer{flex:1;}
  .hint{font-family:var(--mono);font-size:11px;color:var(--muted);}
  /* Highlighted counter chip — kept prominent because word/char/line counts matter for
     AI prompts & skills authored in markdown. Lives in the status bar's right corner. */
  .wordcount{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);
    white-space:nowrap;background:var(--panel-2);border:1px solid var(--accent-dim);
    border-radius:6px;padding:2px 9px;letter-spacing:.02em;}
  kbd{background:var(--panel-2);border:1px solid var(--border);border-bottom-width:2px;padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:10.5px;}
  main{flex:1;min-height:0;display:flex;}
  /* Holds one .tabEditor per open tab, stacked; only the active one is shown. Positioned so
     each absolutely-filled editor gets a height (Toast's height:'100%' needs a sized parent). */
  #editorHost{flex:1;min-width:0;position:relative;}
  .tabEditor{position:absolute;inset:0;}
  .tabEditor.inactive{display:none;}

  /* Tab strip (below the toolbar, above the find bar) — one chip per open document. */
  .tabstrip{display:flex;align-items:stretch;background:var(--panel-2);
    border-bottom:1px solid var(--border);flex-shrink:0;}
  .tablist{display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;}
  .tablist::-webkit-scrollbar{height:0;background:transparent;} /* keep the strip slim */
  .tab{display:flex;align-items:center;gap:7px;padding:6px 10px;max-width:220px;
    border-right:1px solid var(--border);cursor:pointer;font-family:var(--mono);font-size:12px;
    color:var(--muted);white-space:nowrap;user-select:none;}
  .tab:hover{background:var(--panel);}
  .tab.active{background:var(--bg);color:var(--text);box-shadow:inset 0 -2px 0 var(--accent);}
  .tab .tab-name{overflow:hidden;text-overflow:ellipsis;}
  .tab .tab-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;display:none;}
  .tab .tab-dot.show{display:inline-block;}
  .tab .tab-close{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;
    border-radius:4px;border:none;background:transparent;color:var(--muted);font-size:13px;padding:0;
    line-height:1;flex-shrink:0;}
  .tab .tab-close:hover{background:var(--border);color:var(--text);}
  .newtab{border:none;border-radius:0;background:transparent;color:var(--muted);padding:6px 13px;font-size:16px;}
  .newtab:hover{background:var(--panel);border-color:transparent;color:var(--text);}
  footer{padding:5px 14px;background:var(--panel);border-top:1px solid var(--border);font-family:var(--mono);font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .footer-left{display:flex;align-items:center;gap:8px;min-width:0;margin-right:12px;}
  #filePath{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .footer-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
  #statusMsg{color:var(--accent);white-space:nowrap;font-size:13px;font-weight:600;}

  .zoomGroup{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .zoomGroup button{border:none;border-radius:0;padding:5px 10px;min-width:28px;}
  .zoomGroup button+button{border-left:1px solid var(--border);}
  #zoomLabel{font-family:var(--mono);font-size:11px;color:var(--muted);padding:0 4px;min-width:40px;text-align:center;user-select:none;}

  /* Re-skin Toast UI Editor to track the theme variables, and hide the raw-markdown
     mode tab since we want pure inline (WYSIWYG) editing, not a mode switch. */
  .toastui-editor-defaultUI{border:none;}
  .toastui-editor-defaultUI-toolbar{background:var(--panel) !important;border-bottom:1px solid var(--border) !important;}
  .toastui-editor-mode-switch{display:none !important;}
  .toastui-editor-main{background:var(--bg) !important;}
  /* Center the text in a readable column (see --read-col / the reading-width control).
     Horizontal padding via max() keeps .ProseMirror full-width & clickable — only the
     text column narrows; on small windows it falls back to the 40px side padding, and
     --read-col:100% (Full width) collapses the extra padding back to 40px. */
  .ProseMirror{color:var(--text) !important;line-height:1.7;font-size:15px;
    padding-top:24px;padding-bottom:24px;
    padding-inline:max(40px, calc((100% - var(--read-col, 46rem)) / 2)) !important;}
  /* Zoom the WHOLE editor content area uniformly — text, headings, code, images,
     tables, spacing — not just the base font. `zoom` reflows so it always fills
     100% of the editor area at any level. Applies to WYSIWYG surface AND preview. */
  .toastui-editor-contents{zoom:var(--zoom, 1);}
  .toastui-editor-md-preview-highlight{background:var(--panel-2) !important;}

  /* Theme the rendered markdown document itself (WYSIWYG editing surface AND preview),
     so the file's text/headings/code/tables track the light/dark variables too. */
  .toastui-editor-ww-container,
  .toastui-editor-md-container{background:var(--bg) !important;}
  .toastui-editor-contents{color:var(--text) !important;}
  /* Per-element colors default to --text, so themes look uniform unless they opt in
     by defining --c-h1/--c-h2/--c-h3/--c-em/--c-strong (see the "prism" theme). */
  .toastui-editor-contents h1{color:var(--c-h1, var(--text)) !important;}
  .toastui-editor-contents h2{color:var(--c-h2, var(--text)) !important;}
  .toastui-editor-contents h3,.toastui-editor-contents h4,
  .toastui-editor-contents h5,.toastui-editor-contents h6{color:var(--c-h3, var(--text)) !important;}
  .toastui-editor-contents h1,.toastui-editor-contents h2,.toastui-editor-contents h3,
  .toastui-editor-contents h4,.toastui-editor-contents h5,.toastui-editor-contents h6{border-bottom-color:var(--border) !important;}
  .toastui-editor-contents em{color:var(--c-em, inherit) !important;font-style:italic;}
  .toastui-editor-contents strong{color:var(--c-strong, inherit) !important;font-weight:700;}
  .toastui-editor-contents a{color:var(--accent) !important;}
  .toastui-editor-contents code{background:var(--panel-2) !important;color:var(--amber) !important;}
  .toastui-editor-contents pre,.toastui-editor-contents pre code{background:var(--panel) !important;color:var(--text) !important;}
  .toastui-editor-contents blockquote,.toastui-editor-contents blockquote p{border-left-color:var(--border) !important;color:var(--muted) !important;}
  .toastui-editor-contents hr{border-top-color:var(--border) !important;}
  .toastui-editor-contents table th{background:var(--panel-2) !important;}
  .toastui-editor-contents table th,.toastui-editor-contents table td{border-color:var(--border) !important;color:var(--text) !important;}

  /* Dropdown menus (Templates, Copy) */
  .menu{position:relative;display:inline-flex;}
  .menu.split #btnCopy,.menu.split #btnBrowser{border-top-right-radius:0;border-bottom-right-radius:0;}
  .menu.split .caret{padding:7px 7px;border-left:none;border-top-left-radius:0;border-bottom-left-radius:0;}
  .menu-panel{position:absolute;top:calc(100% + 4px);left:0;z-index:30;display:none;flex-direction:column;
    min-width:190px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px;
    box-shadow:0 10px 26px rgba(0,0,0,.4);}
  .menu.open .menu-panel{display:flex;}
  .menu-panel button{background:transparent;border:1px solid transparent;text-align:left;padding:8px 10px;
    border-radius:6px;font-size:13px;width:100%;white-space:nowrap;}
  .menu-panel button:hover{background:var(--panel-2);border-color:transparent;}
  /* Toggle buttons (Raw view, find case/regex) show active state in the accent color. */
  .toggle.active{background:var(--accent-dim);border-color:var(--accent);color:#fff;}

  /* Find / Replace bar (below the toolbar; hidden until opened) */
  .findbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--panel-2);
    border-bottom:1px solid var(--border);flex-shrink:0;}
  .findbar input{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;
    padding:6px 9px;font-family:var(--mono);font-size:12px;min-width:200px;}
  .findbar input:focus{outline:none;border-color:var(--accent);}
  .findbar .toggle{min-width:34px;font-family:var(--mono);}
  .findbar .nav{min-width:30px;padding:6px 8px;}
  .findcount{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;min-width:56px;}
  /* Highlight of find matches in the editing surface, painted via the CSS Custom
     Highlight API (no DOM mutation, so Toast/ProseMirror internals are untouched). */
  ::highlight(find-match){background:rgba(255,214,0,.32);color:inherit;}
  ::highlight(find-current){background:#ff9d2e;color:#000;}

  /* Themed scrollbars (Chromium/WebView2) — flip with light/dark via the variables.
     cursor:default keeps the normal arrow over the bar; without it the editor's
     contenteditable text I-beam bleeds onto its own scrollbar. */
  *::-webkit-scrollbar,
  *::-webkit-scrollbar-track,
  *::-webkit-scrollbar-thumb,
  *::-webkit-scrollbar-corner{cursor:default;}
  *::-webkit-scrollbar{width:12px;height:12px;}
  *::-webkit-scrollbar-track{background:var(--panel);}
  *::-webkit-scrollbar-thumb{background:var(--border);border-radius:7px;border:3px solid var(--panel);}
  *::-webkit-scrollbar-thumb:hover{background:var(--muted);}
  *::-webkit-scrollbar-corner{background:var(--panel);}
</style>
</head>
<body>
    <header>
        <button id="btnNew">New</button>
        <div class="menu" id="tplMenu">
            <button id="btnTemplates" title="Start from a template">Templates ▾</button>
            <div class="menu-panel">
                <button data-tpl="skill">Claude Code Skill</button>
                <button data-tpl="claudemd">CLAUDE.md section</button>
                <button data-tpl="prompt">System + User prompt</button>
                <button data-tpl="pr">PR description</button>
                <button data-tpl="spec">Spec / RFC</button>
            </div>
        </div>
        <button id="btnOpen">Open…</button>
        <button id="btnSave" class="primary">Save</button>
        <button id="btnSaveAs">Save As…</button>
        <div class="menu split" id="copyMenu">
            <button id="btnCopy" title="Copy markdown to clipboard">Copy</button>
            <button id="btnCopyMenu" class="caret" title="Copy options">▾</button>
            <div class="menu-panel">
                <button data-copy="md">Copy as Markdown</button>
                <button data-copy="text">Copy as plain text</button>
            </div>
        </div>
        <div class="menu split" id="browserMenu">
            <button id="btnBrowser" title="Open the full editor in your browser with this document">Open in Browser</button>
            <button id="btnBrowserMenu" class="caret" title="Choose which installed browser to open in" style="display:none">▾</button>
            <div class="menu-panel" id="browserMenuPanel"></div>
        </div>
        <div class="spacer"></div>
        <button id="btnFind" title="Find &amp; replace (Ctrl+F)">Find</button>
        <button id="btnRaw" class="toggle" title="Toggle raw markdown source view">&lt;/&gt; Raw</button>
        <div class="zoomGroup" title="Zoom editor text">
            <button id="zoomOut">−</button>
            <span id="zoomLabel">100%</span>
            <button id="zoomIn">+</button>
        </div>
        <select id="widthSelect" title="Reading width"></select>
        <select id="themeSelect" title="Editor theme"></select>
        <span class="hint"><kbd>Ctrl</kbd>+<kbd>S</kbd> save &nbsp;·&nbsp; <kbd>Ctrl</kbd>+<kbd>F</kbd> find</span>
    </header>
    <div id="tabStrip" class="tabstrip">
        <div id="tabList" class="tablist"></div>
        <button id="btnNewTab" class="newtab" title="New tab (Ctrl+T)">+</button>
    </div>
    <div id="findBar" class="findbar" style="display:none">
        <input id="findInput" type="text" placeholder="Find" />
        <input id="replaceInput" type="text" placeholder="Replace with" />
        <button id="findCase" class="toggle" title="Match case">Aa</button>
        <button id="findRegex" class="toggle" title="Regular expression">.*</button>
        <button id="findPrev" class="nav" title="Previous match (Shift+Enter)">‹</button>
        <button id="findNext" class="nav" title="Next match (Enter)">›</button>
        <span id="findCount" class="findcount"></span>
        <div class="spacer"></div>
        <button id="findReplaceAll">Replace all</button>
        <button id="findClose" title="Close (Esc)">✕</button>
    </div>
<main>
  <div id="editorHost"></div>
</main>
<footer>
  <div class="footer-left">
    <span class="dot" id="dirtyDot" title="Unsaved changes"></span>
    <span id="filePath" title="Full path of the open file">No file open</span>
  </div>
  <div class="footer-right">
    <span id="statusMsg"></span>
    <span id="wordCount" class="wordcount" title="words · characters · lines">0 words · 0 chars · 0 lines</span>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
